<div class="chart-container">
  <ngx-charts-line-chart
    [results]="chartData"
    [scheme]="colorScheme"
    [xAxis]="true"
    [yAxis]="true"
    [legend]="true"
    [legendPosition]="legendPosition"
    [showXAxisLabel]="false"
    [showYAxisLabel]="true"
    yAxisLabel="Value"
    [autoScale]="true"
    [animations]="false"
    [roundDomains]="true"
    [timeline]="false"
  ></ngx-charts-line-chart>
</div>
