<div class="hmi-widget">
  <span class="widget-title">Temperature</span>

  <svg viewBox="0 0 80 220" xmlns="http://www.w3.org/2000/svg" class="thermometer">
    <!-- Scale tick marks -->
    <line x1="19" y1="25"  x2="26" y2="25"  stroke="#bbb" stroke-width="1"/>
    <line x1="22" y1="51"  x2="26" y2="51"  stroke="#ccc" stroke-width="0.5"/>
    <line x1="19" y1="77"  x2="26" y2="77"  stroke="#bbb" stroke-width="1"/>
    <line x1="22" y1="103" x2="26" y2="103" stroke="#ccc" stroke-width="0.5"/>
    <line x1="19" y1="129" x2="26" y2="129" stroke="#bbb" stroke-width="1"/>
    <line x1="22" y1="155" x2="26" y2="155" stroke="#ccc" stroke-width="0.5"/>

    <!-- Scale labels -->
    <text x="17" y="29"  text-anchor="end" font-size="8" fill="#aaa">100°</text>
    <text x="17" y="81"  text-anchor="end" font-size="8" fill="#aaa">60°</text>
    <text x="17" y="133" text-anchor="end" font-size="8" fill="#aaa">20°</text>
    <text x="17" y="159" text-anchor="end" font-size="8" fill="#aaa">0°</text>

    <!-- Tube background -->
    <rect x="27" y="20" width="14" height="135" rx="7"
          fill="#f0f0f0" stroke="#ddd" stroke-width="1.5"/>

    <!-- Mercury fill, clipped to tube shape -->
    <clipPath id="tube-clip">
      <rect x="27" y="20" width="14" height="135" rx="7"/>
    </clipPath>
    <rect
      x="27"
      [attr.y]="fillY()"
      width="14"
      [attr.height]="fillHeight()"
      clip-path="url(#tube-clip)"
      class="mercury"
      [style.fill]="color()"
    />

    <!-- Bulb outer ring -->
    <circle cx="34" cy="174" r="18" fill="#f0f0f0" stroke="#ddd" stroke-width="1.5"/>
    <!-- Bulb mercury fill -->
    <circle cx="34" cy="174" r="14" class="mercury" [style.fill]="color()"/>
    <!-- Bulb highlight -->
    <circle cx="28" cy="168" r="4" fill="rgba(255,255,255,0.4)"/>

    <!-- Current reading inside bulb -->
    <text x="34" y="178" text-anchor="middle"
          font-size="9" font-weight="bold" fill="white">
      {{ parsedTemp() | number:'1.0-0' }}°
    </text>
  </svg>

  <!-- Numeric value -->
  <div class="temp-value" [style.color]="color()">
    {{ parsedTemp() | number:'1.1-1' }}°C
  </div>

  <!-- Status badge -->
  <span class="status-badge" [class]="'badge--' + status().toLowerCase()">
    {{ status() }}
  </span>
</div>
